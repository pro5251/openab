# ==============================================================================
# OpenAB 多 Agent 編排
# 5 個獨立 Discord Bot，各自對應不同角色與模型
#
# 使用前提：
#   1. 在 .env 填入 5 個 DISCORD_BOT_TOKEN_*
#   2. 在 .env 設定 PROJECT_DIR 指向你的專案根目錄
#   3. 確保 Ollama 在宿主機運行（qwen3.5:35b 和 devstral:24b 已拉取）
#
# 啟動：
#   docker compose -f docker-compose.multi-agent.yml up -d
#
# 只啟動單一 agent：
#   docker compose -f docker-compose.multi-agent.yml up -d meichangsu
# ==============================================================================

x-gemini-base: &gemini-base
  image: openab-gemini
  restart: unless-stopped
  env_file: .env
  volumes:
    - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace

services:

  # ── 梅長蘇：Architect（Copilot CLI + Claude Sonnet 4.6）────────────────────
  meichangsu:
    <<: *gemini-base
    # image: openab-copilot
    # restart: unless-stopped
    container_name: openab-meichangsu
    env_file: .env
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace
      - ./agents/configs/meichangsu.toml:/etc/openab/config.toml:ro
      - ./agents/meichangsu/init/GEMINI.md:/home/node/.gemini/GEMINI.md:ro
      - ./agents/meichangsu/skills:/home/node/.gemini/skills:ro

  # ── 簡晨：Backend（Gemini CLI + gemini-2.5-pro）─────────────────────────────
  jianchen:
    <<: *gemini-base
    container_name: openab-jianchen
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace
      - ./agents/configs/jianchen.toml:/etc/openab/config.toml:ro
      - ./agents/jianchen/init/GEMINI.md:/home/node/.gemini/GEMINI.md:ro
      - ./agents/jianchen/skills:/home/node/.gemini/skills:ro

  # ── 言豫津：Frontend（Gemini CLI + gemini-2.5-pro）──────────────────────────
  yanyujin:
    <<: *gemini-base
    container_name: openab-yanyujin
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace
      - ./agents/configs/yanyujin.toml:/etc/openab/config.toml:ro
      - ./agents/yanyujin/init/GEMINI.md:/home/node/.gemini/GEMINI.md:ro
      - ./agents/yanyujin/skills:/home/node/.gemini/skills:ro

  # ── 蒙摯：Ops（Gemini CLI + gemini-2.5-pro）─────────────────────────────────
  mengzhi:
    <<: *gemini-base
    container_name: openab-mengzhi
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace
      - ./agents/configs/mengzhi.toml:/etc/openab/config.toml:ro
      - ./agents/mengzhi/init/GEMINI.md:/home/node/.gemini/GEMINI.md:ro
      - ./agents/mengzhi/skills:/home/node/.gemini/skills:ro

  # ── 夏冬：QA（Gemini CLI + gemini-2.5-pro）──────────────────────────────────
  xiadong:
    <<: *gemini-base
    container_name: openab-xiadong
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ${PROJECT_DIR:?請在 .env 設定 PROJECT_DIR}:/workspace
      - ./agents/configs/xiadong.toml:/etc/openab/config.toml:ro
      - ./agents/xiadong/init/GEMINI.md:/home/node/.gemini/GEMINI.md:ro
      - ./agents/xiadong/skills:/home/node/.gemini/skills:ro
